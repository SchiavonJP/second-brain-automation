services:

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: sb_kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - kuma_data:/app/data
    deploy:
      resources:
        limits:
          memory: 512m

  dockhand:
    image: fnsys/dockhand:latest
    container_name: sb_dockhand
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DOCKHAND_DB_USER}:${DOCKHAND_DB_PASS}@192.168.0.210:5432/dockhand
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  kuma_data:
  dockhand_data:
