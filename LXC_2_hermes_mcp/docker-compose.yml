services:

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: sb_hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # gateway (Telegram, Discord, etc.)
      - "9119:9119"   # dashboard web
    volumes:
      - hermes_data:/opt/data
      - ./skills:/opt/data/skills       # skills centralizadas 
      - ./mcp-config.json:/opt/data/mcp-config.json:ro  # MCP server do vault
    environment:
      # LLM provider — aponta para o LXC 4 (LiteLLM)
      OPENAI_API_BASE: http://192.168.0.211:4000
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      HERMES_DEFAULT_MODEL: auto-heavy

      # Dashboard auth
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_USER}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_PASSWORD}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_SECRET}

      # Postgres no LXC 5
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@192.168.0.210:5432/hermes

      TZ: America/Sao_Paulo
    networks:
      - hermes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9119/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  # MCP server — expõe vault Obsidian e skills para Hermes e Odysseus
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sb_mcp
    restart: unless-stopped
    working_dir: /app
    command: python server.py          # ou remova completamente se o Dockerfile já tiver CMD
    ports:
      - "3100:3100"
    volumes:
      - obsidian_vault:/vault          
      - ./skills:/skills
      - hermes_data:/opt/data:ro       
    environment:
      PORT: 3100
      VAULT_PATH: /vault
      SKILLS_PATH: /skills
      MEMORY_PATH: /opt/data          
      LITELLM_KEY: ${LITELLM_MASTER_KEY}
    networks:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512m
volumes:
  hermes_data:
  obsidian_vault:

networks:
  hermes:
    name: sb_hermes
    driver: bridge