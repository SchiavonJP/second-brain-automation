http:
  routers:

    # LXC 4 — LiteLLM AI Router
    litellm:
      rule: "Host(`litellm.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: litellm
      middlewares:
        - secure-headers
        - rate-limit-api

    # LiteLLM UI de administração
    litellm-ui:
      rule: "Host(`litellm.joaopaulo.me`) && PathPrefix(`/ui`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: litellm
      middlewares:
        - secure-headers
        - rate-limit-admin

    # LXC 3 — Odysseus
    odysseus:
      rule: "Host(`odysseus.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: odysseus
      middlewares:
        - secure-headers

    # LXC 2 — Hermes
    hermes:
      rule: "Host(`hermes.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: hermes
      middlewares:
        - secure-headers

    # LXC 7 — Uptime Kuma
    monitor:
      rule: "Host(`monitor.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: monitor
      middlewares:
        - secure-headers

    # LXC 7 — Dockhand
    dockhand:
      rule: "Host(`dockhand.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: dockhand
      middlewares:
        - secure-headers

    # LXC 8 — Apollo (llama.cpp inference)
    apollo:
      rule: "Host(`apollo.joaopaulo.me`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: apollo
      middlewares:
        - secure-headers
        - rate-limit-api

  services:

    # LXC 4 — port 4000
    litellm:
      loadBalancer:
        servers:
          - url: "http://192.168.0.211:4000"

    # LXC 3 — port 7000
    odysseus:
      loadBalancer:
        servers:
          - url: "http://192.168.0.214:7000"

    # LXC 2 — port 9119 (dashboard)
    hermes:
      loadBalancer:
        servers:
          - url: "http://192.168.0.213:9119"

    # LXC 7 — port 3001 (Uptime Kuma)
    monitor:
      loadBalancer:
        servers:
          - url: "http://192.168.0.216:3001"

    # LXC 7 — port 3000 (Dockhand)
    dockhand:
      loadBalancer:
        servers:
          - url: "http://192.168.0.216:3000"

    # LXC 8 — port 8080 (llama-server)
    apollo:
      loadBalancer:
        servers:
          - url: "http://192.168.0.217:8080"
