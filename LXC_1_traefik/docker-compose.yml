services:

  traefik:
    image: traefik:v3.6
    container_name: sb_traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      TZ: America/Sao_Paulo
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - ./dynamic:/etc/traefik/dynamic:ro
        
    command:
      - "--api.insecure=true"
      # Substitui o tlschallenge por dnsChallenge
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53

      # API e dashboard
      - --api.dashboard=true
      #- --api.insecure=false

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # Redirect HTTP → HTTPS global
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true

      # Docker provider — descobre serviços via labels
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=sb_proxy

      # File provider — configs dinâmicas em ./dynamic/
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      # Logs
      - --log.level=INFO
      - --accesslog=true

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      # Basic auth — gera com: echo $(htpasswd -nb admin senha) | sed -e s/\\$/\\$\\$/g
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  traefik_certs:

networks:
  proxy:
    name: sb_proxy
    driver: bridge
    external: false